    x: 0
    y: 0
    width: 794
    height: 84
    style:
      background: "#416993"
      text_color: "#FFFFFF"

  - id: left.sidebar
    x: 0
    y: 84
    width: 250
    height: 1039
    style:
      background: "#F1F1F1"
      text_color: "#27303A"

  - id: right.content
    x: 250
    y: 84
    width: 544
    height: 1039
