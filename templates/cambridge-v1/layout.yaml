    region: left.sidebar
    order: 2
  - slot_id: skills.languages
    region: left.sidebar
    order: 3

  - slot_id: positioning.profile_summary
    region: right.content
    order: 1
  - slot_id: experience.items
    region: right.content
    order: 2
  - slot_id: education.items
    region: right.content
    order: 3
