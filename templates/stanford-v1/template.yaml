meta:
  template_id: stanford-v1
  name: Stanford
  version: 1.0
  author: MuhFweeCeeVee
  status: draft

page:
  size: A4
  orientation: portrait
  margins_mm:
    top: 12
    right: 12
    bottom: 12
    left: 12

labels:
  en:
    common:
      page: "Page"
      present: "present"
    sections:
      personal_details: "Personal details"
      interests: "Interests"
      languages: "Languages"
      skills: "Skills"
      work_experience: "Work experience"
      education: "Education and Qualifications"
      references: "References"
    contact_labels:
      name: "Name"
      address: "Address"
      phone: "Phone number"
      email: "Email address"
      driving_license: "Driving license"
      linkedin: "LinkedIn"
    language_levels:
      native: "Native speaker"
      very_good: "Very good command"
      working: "Working knowledge"
      basic: "Basic understanding"
  bg:
    common:
      page: "Страница"
      present: "до момента"
    sections:
      personal_details: "Лични данни"
      interests: "Интереси"
      languages: "Езици"
      skills: "Умения"
      work_experience: "Професионален опит"
      education: "Образование и квалификации"
      references: "Препоръки"
    contact_labels:
      name: "Име"
      address: "Адрес"
      phone: "Телефон"
      email: "Имейл"
      driving_license: "Шофьорска книжка"
      linkedin: "LinkedIn"
    language_levels:
      native: "Майчин"
      very_good: "Много добро ниво"
      working: "Работно ниво"
      basic: "Базово ниво"

tokens:
  fonts:
    heading: "IBM Plex Sans"
    body: "IBM Plex Sans"
  colors:
    sidebar: "#2D2D2D"
    background: "#FFFFFF"

name_display:
  title: full

date_display:
  experience: year
  education: year

text_layout:
  profile_summary: single_paragraph

slots:
  - id: person.full_name
    source_hint: person.full_name
  - id: profile.photo
    source_hint: optional_sections.attachments[0]
  - id: contact.block
    source_hint: person.contact
  - id: optional.interests
    source_hint: optional_sections.interests
  - id: skills.languages
    source_hint: skills.languages
  - id: skills.technical
    source_hint: skills.technical
  - id: positioning.profile_summary
    source_hint: positioning.profile_summary
  - id: experience.items
    source_hint: experience
  - id: education.items
    source_hint: education
  - id: references.items
    source_hint: references

rules:
  max_pages: 2
  overflow:
    strategy: continue_to_next_page
    warn_at_page: 2
  widow_orphan_control: true
  bullet_limit_per_experience_item: 5
