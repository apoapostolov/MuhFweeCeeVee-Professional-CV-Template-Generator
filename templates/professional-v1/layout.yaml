layout_version: 1
coordinates_unit: px
page:
  width: 794
  height: 1123

regions:
  - id: left.sidebar
    x: 0
    y: 0
    width: 270
    height: 1123
    style:
      background: "#F9FAFB"
      border_right: "1px solid #E5E7EB"

  - id: right.content
    x: 270
    y: 0
    width: 524
    height: 1123
    style:
      background: "#FFFFFF"

slot_placement:
  - slot_id: person.full_name
    region: right.content
    order: 1
  - slot_id: positioning.headline
    region: right.content
    order: 2
  - slot_id: positioning.profile_summary
    region: right.content
    order: 3
  - slot_id: experience.items
    region: right.content
    order: 4
  - slot_id: education.items
    region: right.content
    order: 5

  - slot_id: contact.block
    region: left.sidebar
    order: 1
  - slot_id: skills.languages
    region: left.sidebar
    order: 2
  - slot_id: skills.technical
    region: left.sidebar
    order: 3
  - slot_id: skills.social
    region: left.sidebar
    order: 4
  - slot_id: references.items
    region: left.sidebar
    order: 5
