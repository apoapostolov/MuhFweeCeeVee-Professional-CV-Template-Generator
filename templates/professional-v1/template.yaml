meta:
  template_id: professional-v1
  name: Professional Two-Column (Bootstrap)
  version: 0.1.0
  author: MyFreeCeeVee
  status: draft

page:
  size: A4
  orientation: portrait
  margins_mm:
    top: 12
    right: 12
    bottom: 12
    left: 12

tokens:
  fonts:
    heading: "Inter"
    body: "Inter"
    mono: "JetBrains Mono"
  colors:
    text_primary: "#111827"
    text_secondary: "#4B5563"
    accent: "#0F766E"
    border: "#D1D5DB"
    background: "#FFFFFF"
  spacing:
    section_gap_px: 16
    item_gap_px: 8

layout_model:
  type: two_column
  left_column_width_pct: 34
  right_column_width_pct: 66

slots:
  - id: person.full_name
    source_hint: person.full_name
  - id: positioning.headline
    source_hint: positioning.headline
  - id: positioning.profile_summary
    source_hint: positioning.profile_summary
  - id: contact.block
    source_hint: person.contact
  - id: skills.technical
    source_hint: skills.technical
  - id: skills.social
    source_hint: skills.social
  - id: skills.languages
    source_hint: skills.languages
  - id: experience.items
    source_hint: experience
  - id: education.items
    source_hint: education
  - id: references.items
    source_hint: references

rules:
  max_pages: 2
  overflow:
    strategy: continue_to_next_page
    warn_at_page: 2
  widow_orphan_control: true
  bullet_limit_per_experience_item: 5
